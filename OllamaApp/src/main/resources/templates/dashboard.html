<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <link rel="stylesheet" th:href="@{/css/dashboard-style.css}"/>
    <title>Ollama</title>
</head>

<body>
<header class="site-header">
    <div class="container header-inner">
        <div class="brand">
            <img src="/images/Ollama_pic.png" alt="Ollama"/>
            <h1>Ollama AI</h1>
        </div>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="https://github.com/HamzehAdawi/OllamaChat" target="_blank" rel="noopener">Source</a>
            <a href="/">Demo</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="panel">
        <div class="panel-header">
            <h2 th:text="'Model: ' + ${ollamaModel}"></h2>
        </div>

        <div class="panel-body">
            <div class="loader" id="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="chat-box">
                <form th:action="@{/}" method="post" onsubmit="return showLoader()">
                    <div id="chat" th:if="${messageList != null and !#lists.isEmpty(messageList)}">
                        <div th:each="msg : ${messageList}">
                            <div class="message"
                                 th:utext="${#strings.replace(#strings.replace(msg, 'Me:', '<strong>Me:</strong>'), 'Ollama:', '<strong>Ollama:</strong>')}">
                            </div>
                        </div>
                    </div>

                    <div class="input-row">
                        <textarea
                            placeholder="Chat with Ollama..."
                            id="input"
                            name="input"
                            class="input-textarea"></textarea>

                        <div class="actions">
                            <button id="ask-button" type="submit">Ask</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container footer-inner">
            <small>Contributions welcome — see <a href="/../CONTRIBUTING.md" target="_blank">CONTRIBUTING</a> and <a href="/../CODE_OF_CONDUCT.md" target="_blank">CODE_OF_CONDUCT</a></small>
        </div>
    </footer>
</main>

<script th:src="@{/js/dashboard-script.js}"></script>
</body>
</html>
